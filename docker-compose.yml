services:
  postgres:
    image: postgres:16
    container_name: moonbug-pg
    environment:
      POSTGRES_USER: moonbug
      POSTGRES_PASSWORD: moonbug
      POSTGRES_DB: moonbug
    ports:
      - "5432:5432"
    volumes:
      - moonbug-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moonbug"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  moonbug-pgdata:
